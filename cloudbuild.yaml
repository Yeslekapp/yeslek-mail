# ---------------------------
# Yeslek Mail Cloud Build
# ---------------------------

steps:
  # ---------------------------
  # Build container image
  # ---------------------------

  - id: build-image
    name: gcr.io/cloud-builders/docker

    args:
      - build
      - --pull
      - --tag
      - >-
        ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$BUILD_ID
      - .


  # ---------------------------
  # Push to Artifact Registry
  # ---------------------------

  - id: push-image
    name: gcr.io/cloud-builders/docker

    waitFor:
      - build-image

    args:
      - push
      - >-
        ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$BUILD_ID


  # ---------------------------
  # Create or update migration job
  # ---------------------------

  - id: deploy-migration-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud

    waitFor:
      - push-image

    args:
      - run
      - jobs
      - deploy
      - ${_MIGRATION_JOB}

      - >-
        --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$BUILD_ID

      - --region=${_REGION}
      - --service-account=${_RUNTIME_SERVICE_ACCOUNT}

      - >-
        --set-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE_ID}

      - --command=flask
      - --args=--app,app,db,upgrade

      - --tasks=1
      - --max-retries=1
      - --task-timeout=900s

      - --cpu=1
      - --memory=1Gi

      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only

      - >-
        --set-env-vars=APP_ENV=production,PUBLIC_BASE_URL=${_PUBLIC_BASE_URL},PREFERRED_URL_SCHEME=https,TRUST_PROXY_HEADERS=true,SESSION_COOKIE_SECURE=true,REMEMBER_COOKIE_SECURE=true,WTF_CSRF_SSL_STRICT=true

      - >-
        --set-secrets=SECRET_KEY=${_SECRET_KEY_SECRET}:latest,API_KEY_PEPPER=${_API_KEY_PEPPER_SECRET}:latest,DATABASE_URL=${_DATABASE_URL_SECRET}:latest,REDIS_URL=${_REDIS_URL_SECRET}:latest,SESSION_REDIS_URL=${_SESSION_REDIS_URL_SECRET}:latest,CELERY_BROKER_URL=${_CELERY_BROKER_URL_SECRET}:latest,CELERY_RESULT_BACKEND=${_CELERY_RESULT_BACKEND_SECRET}:latest

      - --quiet


  # ---------------------------
  # Execute database migrations
  # ---------------------------

  - id: execute-migrations
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud

    waitFor:
      - deploy-migration-job

    args:
      - run
      - jobs
      - execute
      - ${_MIGRATION_JOB}

      - --region=${_REGION}
      - --wait
      - --quiet


  # ---------------------------
  # Deploy Flask web service
  # ---------------------------

  - id: deploy-web-service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud

    waitFor:
      - execute-migrations

    args:
      - run
      - deploy
      - ${_SERVICE_NAME}

      - >-
        --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$BUILD_ID

      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_RUNTIME_SERVICE_ACCOUNT}

      - >-
        --set-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE_ID}

      - --port=8080
      - --cpu=1
      - --memory=1Gi
      - --concurrency=40
      - --timeout=60

      - --min-instances=0
      - --max-instances=10

      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only

      - --allow-unauthenticated

      - >-
        --set-env-vars=CONTAINER_MODE=web,APP_ENV=production,PUBLIC_BASE_URL=${_PUBLIC_BASE_URL},PREFERRED_URL_SCHEME=https,TRUST_PROXY_HEADERS=true,SESSION_COOKIE_SECURE=true,REMEMBER_COOKIE_SECURE=true,WTF_CSRF_SSL_STRICT=true,SMTP_HOST=${_SMTP_HOST},SMTP_PORT=${_SMTP_PORT},SMTP_USE_TLS=${_SMTP_USE_TLS},SMTP_USE_SSL=false,MAIL_DEFAULT_SENDER_EMAIL=${_MAIL_DEFAULT_SENDER_EMAIL},MAIL_DEFAULT_SENDER_NAME=${_MAIL_DEFAULT_SENDER_NAME},MAIL_MESSAGE_ID_DOMAIN=${_MAIL_MESSAGE_ID_DOMAIN},DEFAULT_MONTHLY_EMAIL_LIMIT=${_DEFAULT_MONTHLY_EMAIL_LIMIT}

      - >-
        --set-secrets=SECRET_KEY=${_SECRET_KEY_SECRET}:latest,API_KEY_PEPPER=${_API_KEY_PEPPER_SECRET}:latest,DATABASE_URL=${_DATABASE_URL_SECRET}:latest,REDIS_URL=${_REDIS_URL_SECRET}:latest,SESSION_REDIS_URL=${_SESSION_REDIS_URL_SECRET}:latest,CELERY_BROKER_URL=${_CELERY_BROKER_URL_SECRET}:latest,CELERY_RESULT_BACKEND=${_CELERY_RESULT_BACKEND_SECRET}:latest

      - --quiet


  # ---------------------------
  # Deploy continuous Celery worker
  # ---------------------------

  - id: deploy-celery-worker
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud

    waitFor:
      - execute-migrations

    args:
      - run
      - worker-pools
      - deploy
      - ${_WORKER_POOL}

      - >-
        --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$BUILD_ID

      - --region=${_REGION}
      - --service-account=${_RUNTIME_SERVICE_ACCOUNT}

      - >-
        --set-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE_ID}

      - --instances=${_WORKER_INSTANCES}
      - --cpu=1
      - --memory=1Gi

      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only

      - >-
        --set-env-vars=CONTAINER_MODE=worker,APP_ENV=production,PUBLIC_BASE_URL=${_PUBLIC_BASE_URL},PREFERRED_URL_SCHEME=https,TRUST_PROXY_HEADERS=true,SMTP_HOST=${_SMTP_HOST},SMTP_PORT=${_SMTP_PORT},SMTP_USE_TLS=${_SMTP_USE_TLS},SMTP_USE_SSL=false,MAIL_DEFAULT_SENDER_EMAIL=${_MAIL_DEFAULT_SENDER_EMAIL},MAIL_DEFAULT_SENDER_NAME=${_MAIL_DEFAULT_SENDER_NAME},MAIL_MESSAGE_ID_DOMAIN=${_MAIL_MESSAGE_ID_DOMAIN},CELERY_LOG_LEVEL=INFO,CELERY_CONCURRENCY=2

      - >-
        --set-secrets=SECRET_KEY=${_SECRET_KEY_SECRET}:latest,API_KEY_PEPPER=${_API_KEY_PEPPER_SECRET}:latest,DATABASE_URL=${_DATABASE_URL_SECRET}:latest,REDIS_URL=${_REDIS_URL_SECRET}:latest,SESSION_REDIS_URL=${_SESSION_REDIS_URL_SECRET}:latest,CELERY_BROKER_URL=${_CELERY_BROKER_URL_SECRET}:latest,CELERY_RESULT_BACKEND=${_CELERY_RESULT_BACKEND_SECRET}:latest

      - --quiet


# ---------------------------
# Published image
# ---------------------------

images:
  - >-
    ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$BUILD_ID


# ---------------------------
# Default substitutions
# ---------------------------

substitutions:
  _REGION: europe-west1
  _REPOSITORY: yeslek
  _SERVICE_NAME: yeslek-mail

  _CLOUD_SQL_INSTANCE_ID: yeslek-postgres

  _MIGRATION_JOB: yeslek-mail-migrate
  _WORKER_POOL: yeslek-mail-worker
  _WORKER_INSTANCES: "1"

  _RUNTIME_SERVICE_ACCOUNT: >-
    yeslek-runtime@${PROJECT_ID}.iam.gserviceaccount.com

  _VPC_CONNECTOR: yeslek-serverless-vpc

  _PUBLIC_BASE_URL: https://mail.example.com

  _SMTP_HOST: 10.10.0.10
  _SMTP_PORT: "587"
  _SMTP_USE_TLS: "true"

  _MAIL_DEFAULT_SENDER_EMAIL: notifications@example.com
  _MAIL_DEFAULT_SENDER_NAME: Yeslek Mail
  _MAIL_MESSAGE_ID_DOMAIN: example.com

  _DEFAULT_MONTHLY_EMAIL_LIMIT: "300"

  _SECRET_KEY_SECRET: yeslek-secret-key
  _API_KEY_PEPPER_SECRET: yeslek-api-key-pepper
  _DATABASE_URL_SECRET: yeslek-database-url
  _REDIS_URL_SECRET: yeslek-redis-url
  _SESSION_REDIS_URL_SECRET: yeslek-session-redis-url
  _CELERY_BROKER_URL_SECRET: yeslek-celery-broker-url
  _CELERY_RESULT_BACKEND_SECRET: yeslek-celery-result-backend


# ---------------------------
# Build options
# ---------------------------

options:
  dynamicSubstitutions: true
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s



mail.example.com
notifications@example.com
example.com
10.10.0.10