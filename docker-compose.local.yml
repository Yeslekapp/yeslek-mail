services:
  # ---------------------------
  # PostgreSQL
  # ---------------------------

  postgres:
    image: postgres:16-alpine
    container_name: yeslek-mail-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: yeslek_mail
      POSTGRES_USER: yeslek
      POSTGRES_PASSWORD: yeslek_local_password

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - yeslek_mail_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U yeslek -d yeslek_mail
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

    networks:
      - yeslek_mail_network


  # ---------------------------
  # Redis
  # ---------------------------

  redis:
    image: redis:7-alpine
    container_name: yeslek-mail-redis
    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory-policy
      - noeviction

    ports:
      - "127.0.0.1:6379:6379"

    volumes:
      - yeslek_mail_redis_data:/data

    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

    networks:
      - yeslek_mail_network


  # ---------------------------
  # Local SMTP inbox
  # ---------------------------

  mailpit:
    image: axllent/mailpit:latest
    container_name: yeslek-mail-mailpit
    restart: unless-stopped

    environment:
      MP_MAX_MESSAGES: "5000"
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

    volumes:
      - yeslek_mail_mailpit_data:/data

    healthcheck:
      test:
        - CMD
        - /mailpit
        - readyz
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

    networks:
      - yeslek_mail_network


  # ---------------------------
  # Flask development server
  # ---------------------------

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    container_name: yeslek-mail-web
    restart: unless-stopped

    env_file:
      - .env

    environment:
      APP_ENV: development
      PORT: "5000"
      CONTAINER_MODE: web

      DATABASE_URL: >-
        postgresql+psycopg://yeslek:yeslek_local_password@postgres:5432/yeslek_mail

      REDIS_URL: redis://redis:6379/0
      SESSION_REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3

      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_USE_TLS: "false"
      SMTP_USE_SSL: "false"

      SESSION_COOKIE_SECURE: "false"
      REMEMBER_COOKIE_SECURE: "false"
      WTF_CSRF_SSL_STRICT: "false"

    command:
      - flask
      - --app
      - app
      - run
      - --debug
      - --host=0.0.0.0
      - --port=5000

    ports:
      - "127.0.0.1:5000:5000"

    volumes:
      - .:/app

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

      mailpit:
        condition: service_healthy

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen(
          "http://127.0.0.1:5000/health",
          timeout=3
          ).read()
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - yeslek_mail_network


  # ---------------------------
  # Celery worker
  # ---------------------------

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    container_name: yeslek-mail-worker
    restart: unless-stopped

    env_file:
      - .env

    environment:
      APP_ENV: development
      CONTAINER_MODE: worker

      DATABASE_URL: >-
        postgresql+psycopg://yeslek:yeslek_local_password@postgres:5432/yeslek_mail

      REDIS_URL: redis://redis:6379/0
      SESSION_REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3

      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_USE_TLS: "false"
      SMTP_USE_SSL: "false"

      CELERY_LOG_LEVEL: INFO
      CELERY_CONCURRENCY: "2"

    volumes:
      - .:/app

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

      mailpit:
        condition: service_healthy

    networks:
      - yeslek_mail_network


  # ---------------------------
  # Manual migration command
  # ---------------------------

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    container_name: yeslek-mail-migrate

    profiles:
      - tools

    env_file:
      - .env

    environment:
      APP_ENV: development

      DATABASE_URL: >-
        postgresql+psycopg://yeslek:yeslek_local_password@postgres:5432/yeslek_mail

      REDIS_URL: redis://redis:6379/0
      SESSION_REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3

      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USE_TLS: "false"

    command:
      - flask
      - --app
      - app
      - db
      - upgrade

    volumes:
      - .:/app

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    networks:
      - yeslek_mail_network


# ---------------------------
# Persistent volumes
# ---------------------------

volumes:
  yeslek_mail_postgres_data:
    name: yeslek_mail_postgres_data

  yeslek_mail_redis_data:
    name: yeslek_mail_redis_data

  yeslek_mail_mailpit_data:
    name: yeslek_mail_mailpit_data


# ---------------------------
# Private local network
# ---------------------------

networks:
  yeslek_mail_network:
    name: yeslek_mail_network
    driver: bridge